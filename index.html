<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zombite3</title>
    <style>
      :root {
        font-family: "Trebuchet MS", Verdana, sans-serif;
        background: #101827;
        color: #f8fafc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(14, 116, 144, 0.35), transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(220, 38, 38, 0.3), transparent 45%),
          #020617;
      }

      #app {
        width: min(100vw, 1024px);
        aspect-ratio: 16 / 9;
        border: 2px solid rgba(148, 163, 184, 0.45);
        box-shadow: 0 18px 50px rgba(2, 6, 23, 0.7);
        overflow: hidden;
        position: relative;
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.18), rgba(2, 6, 23, 0.1)),
          radial-gradient(circle at 50% 100%, rgba(245, 158, 11, 0.12), transparent 42%);
      }

      #app::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.02)),
          repeating-linear-gradient(180deg, rgba(148, 163, 184, 0.03) 0, rgba(148, 163, 184, 0.03) 1px, transparent 1px, transparent 6px);
        pointer-events: none;
        z-index: 5;
      }

      .chrome-strip {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 2100;
        display: flex;
        gap: 0.5rem;
      }

      .chrome-button {
        border: 1px solid rgba(148, 163, 184, 0.45);
        background: rgba(2, 6, 23, 0.72);
        color: #e2e8f0;
        padding: 0.45rem 0.75rem;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        backdrop-filter: blur(8px);
        cursor: pointer;
        box-shadow: 0 8px 22px rgba(2, 6, 23, 0.28);
      }

      .chrome-button:hover {
        background: rgba(8, 47, 73, 0.88);
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(2, 6, 23, 0.68);
        backdrop-filter: blur(8px);
        z-index: 2000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform: scale(0.9);
      }

      .overlay::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 20%, rgba(56, 189, 248, 0.16), transparent 30%),
          linear-gradient(180deg, rgba(245, 158, 11, 0.06), transparent 28%);
      }

      .overlay.active {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1);
      }

      .overlay[data-tone="danger"]::before {
        background:
          radial-gradient(circle at 50% 20%, rgba(239, 68, 68, 0.18), transparent 32%),
          linear-gradient(180deg, rgba(127, 29, 29, 0.14), transparent 30%);
      }

      .overlay[data-tone="success"]::before {
        background:
          radial-gradient(circle at 50% 20%, rgba(34, 197, 94, 0.16), transparent 32%),
          linear-gradient(180deg, rgba(16, 185, 129, 0.1), transparent 30%);
      }

      .overlay-content {
        background: rgba(15, 23, 42, 0.9);
        border: 2px solid #38bdf8;
        padding: 2.2rem;
        width: min(56%, 460px);
        margin-left: auto;
        margin-right: 5%;
        text-align: center;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        position: relative;
      }

      .overlay-content::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(56, 189, 248, 0.06), transparent 28%),
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.06), transparent 42%);
        pointer-events: none;
      }

      .overlay-eyebrow {
        margin-bottom: 0.7rem;
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #7dd3fc;
      }

      .overlay-meta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.7rem;
        margin-bottom: 0.85rem;
        border: 1px solid rgba(148, 163, 184, 0.26);
        background: rgba(2, 6, 23, 0.42);
        color: #cbd5e1;
        font-size: 0.78rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .overlay-meta strong {
        color: #f8fafc;
      }

      .overlay-footnote {
        margin-top: 1.1rem;
        font-size: 0.78rem;
        color: #94a3b8;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .overlay-title {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        color: #f8fafc;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
      }

      .overlay-body {
        font-size: 1.1rem;
        line-height: 1.6;
        color: #cbd5e1;
        margin-bottom: 2rem;
        white-space: pre-wrap;
      }

      .button-group {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .game-button {
        background: #0f172a;
        border: 2px solid #22d3ee;
        color: #f8fafc;
        padding: 0.8rem 2rem;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
      }

      .game-button:hover {
        background: #164e63;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(34, 211, 238, 0.3);
      }

      .game-button:active {
        transform: translateY(0);
      }

      .game-button.secondary {
        border-color: #64748b;
        color: #94a3b8;
      }

      .game-button.secondary:hover {
        border-color: #94a3b8;
        color: #f1f5f9;
        background: #334155;
      }

      canvas {
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }

      @media (max-width: 768px) {
        body {
          min-height: 100dvh;
          padding: 0;
        }

        #app {
          width: 100vw;
          max-width: none;
          border-width: 0;
          box-shadow: none;
        }

        .overlay-content {
          width: calc(100% - 2rem);
          margin-right: 0;
          padding: 1.4rem;
          max-width: none;
        }

        .overlay-title {
          font-size: 1.6rem;
          letter-spacing: 1px;
        }

        .overlay-body {
          font-size: 0.95rem;
          line-height: 1.45;
          margin-bottom: 1.25rem;
        }
      }

      @media (max-width: 420px) {
        .chrome-strip {
          top: 8px;
          right: 8px;
        }

        .chrome-button {
          padding: 0.35rem 0.55rem;
          font-size: 0.7rem;
        }

        .overlay-content {
          width: calc(100% - 1rem);
          padding: 1rem 0.85rem;
        }

        .overlay-title {
          font-size: 1.3rem;
        }

        .overlay-body {
          font-size: 0.82rem;
        }

        .game-button {
          padding: 0.7rem 1rem;
          font-size: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="chrome-strip">
        <button id="audio-toggle" class="chrome-button" type="button" aria-pressed="false">Sonido Activo</button>
      </div>
      <div id="game-overlay" class="overlay">
        <div class="overlay-content">
          <div id="overlay-eyebrow" class="overlay-eyebrow">Supervivencia de Oficina</div>
          <div id="overlay-meta" class="overlay-meta"></div>
          <h2 id="overlay-title" class="overlay-title"></h2>
          <p id="overlay-body" class="overlay-body"></p>
          <div id="overlay-buttons" class="button-group"></div>
          <div id="overlay-footnote" class="overlay-footnote"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
